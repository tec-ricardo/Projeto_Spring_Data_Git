# ============================================
# PORTA DA APLICACAO
# ============================================
server.port=8081

# ============================================
# CONFIGURACAO DO H2 DATABASE
# ============================================
# Banco em memoria chamado usuariosdb
spring.datasource.url=jdbc:h2:mem:usuariosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# H2 CONSOLE
# ============================================
# Habilita o console web do H2 no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# JPA / HIBERNATE
# ============================================
# update = cria/atualiza a tabela com base nas entities
spring.jpa.hibernate.ddl-auto=update

# Mostra os SQLs gerados no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Opcional: ajuda a garantir que o console do H2 funcione bem
spring.jpa.defer-datasource-initialization=true
